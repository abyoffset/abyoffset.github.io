<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting...</title>
    <style>
        /* --- RESET & BASE STYLE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0a0a0c;
            overflow: hidden; /* Kunci scroll selama loading animasi */
        }

        /* --- SPLASH SCREEN CONTAINER (SPLIT PANEL) --- */
        .splash-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        /* Membelah layar jadi dua bagian (Atas & Bawah) */
        .splash-panel {
            width: 100%;
            height: 50vh;
            background-color: #0a0a0c;
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .panel-top { border-bottom: 1px solid rgba(0, 242, 254, 0.1); }
        .panel-bottom { border-top: 1px solid rgba(0, 242, 254, 0.1); }

        /* --- KONTEN DI TENGAH LAYAR --- */
        .splash-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            text-align: center;
            transition: opacity 0.4s ease;
        }

        /* Animasi Logo Flicker (Kedip Neon) */
        .logo-box img {
            max-width: 160px;
            height: auto;
            animation: flicker 1.5s ease-in-out infinite alternate;
        }

        /* --- PROGRESS BAR MINIMALIS --- */
        .loading-bar-container {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            margin: 25px auto 0 auto;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00f2fe, #4facfe); /* Gradasi Cyan Neon */
            box-shadow: 0 0 8px #00f2fe;
            animation: fillBar 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* --- KEYFRAMES ANIMASI --- */
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                opacity: 1;
                filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.6));
            }
            20%, 24%, 55% {
                opacity: 0.7;
                filter: none;
            }
        }

        @keyframes fillBar {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        /* --- TRIGGER KELUAR --- */
        .splash-wrapper.hide .panel-top {
            transform: translateY(-100%); /* Panel atas meluncur ke atas */
        }
        .splash-wrapper.hide .panel-bottom {
            transform: translateY(100%); /* Panel bawah meluncur ke bawah */
        }
        .splash-wrapper.hide .splash-content {
            opacity: 0; /* Logo dan progress bar menghilang */
        }
    </style>
</head>
<body>

    <!-- SPLASH SCREEN SCREEN -->
    <div class="splash-wrapper" id="splashWrapper">
        <div class="splash-panel panel-top"></div>
        
        <div class="splash-content">
            <div class="logo-box">
                <!-- Ganti 'logo.png' dengan file gambar logomu -->
                <img src="logo.png" alt="Logo">
            </div>
            <!-- Progress Bar -->
            <div class="loading-bar-container">
                <div class="loading-bar"></div>
            </div>
        </div>

        <div class="splash-panel panel-bottom"></div>
    </div>

    <!-- JAVASCRIPT REDIRECT (VERSI FIX BACK BUTTON) -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Menunggu loading progress bar berjalan (2.5 detik)
            setTimeout(function() {
                const wrapper = document.getElementById('splashWrapper');
                
                // Picu animasi keluar (pintu membelah atas bawah)
                wrapper.classList.add('hide'); 
                
                // Tunggu transisi pintu kebuka selesai (0.8 detik), lalu skip ke index
                setTimeout(() => {
                    // Pakai replace supaya riwayat welcome.html dihapus dari history browser
                    window.location.replace("index1.html"); 
                }, 800);

            }, 2500);
        });
    </script>
</body>
</html>
